<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Mind Map</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Auto Mind Map</h1>
            <p class="subtitle">文档关系分析工具</p>
        </header>

        <div class="controls">
            <div class="input-group" style="flex: 2;">
                <label for="dirPath">文档目录</label>
                <input type="text" id="dirPath" placeholder="data" value="data">
            </div>
            <div class="button-group">
                <button id="analyzeBtn" class="btn primary">分析文档</button>
                <button id="saveBtn" class="btn secondary" disabled>保存图表</button>
                <button id="loadBtn" class="btn secondary">加载图表</button>
            </div>
        </div>

        <div class="stats" id="stats"></div>

        <div class="main-content">
            <div class="graph-container" id="graphContainer">
                <div id="graph"></div>
                <div id="tooltip" class="tooltip"></div>
            </div>

            <div class="sidebar" id="sidebar">
                <h3>参数设置</h3>
                <div class="param-settings">
                    <div class="param-item">
                        <label for="threshold">相关度阈值: <span id="thresholdValue">0.15</span></label>
                        <input type="range" id="threshold" min="0" max="1" step="0.05" value="0.15">
                    </div>
                    <div class="param-item">
                        <label for="algorithm">相似度算法</label>
                        <select id="algorithm">
                            <option value="jaccard">Jaccard</option>
                            <option value="cosine">Cosine TF-IDF</option>
                            <option value="claude">Claude API</option>
                        </select>
                    </div>
                    <div class="param-item">
                        <label for="tooltipOffset">提示偏移: <span id="tooltipOffsetValue">30</span>px</label>
                        <input type="range" id="tooltipOffset" min="0" max="50" step="5" value="30">
                    </div>
                    <div class="param-item">
                        <label for="parentDepth">父子层级: <span id="parentDepthValue">1</span></label>
                        <input type="range" id="parentDepth" min="0" max="5" step="1" value="1">
                    </div>
                </div>

                <h3>文档选择</h3>
                <div id="docSelector" class="doc-selector">
                    <p class="placeholder">分析后显示文档列表</p>
                </div>
                <h3>节点详情</h3>
                <div id="nodeDetail" class="node-detail">
                    <p class="placeholder">点击节点查看详情</p>
                </div>
                <h3>保存的图表</h3>
                <div id="savedFiles" class="saved-files">
                    <p class="placeholder">暂无保存的图表</p>
                </div>
            </div>
        </div>

        <div id="loading" class="loading">分析中...</div>
    </div>

    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="/static/graph.js"></script>
</body>
</html>
